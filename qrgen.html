<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工單 QR Code 產生器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f5; --text: #111111; --text2: #555555;
      --text3: #999999; --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 10px; --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1a1a; --bg2: #242424; --text: #f0f0f0; --text2: #aaaaaa; --text3: #666666; --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.20); }
    }
    body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 1.5rem; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
    .sub { font-size: 13px; color: var(--text3); margin-bottom: 1.5rem; }
    label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
    input { display: block; width: 100%; padding: 11px 12px; font-size: 15px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-family: inherit; margin-bottom: 1rem; }
    input:focus { outline: 2px solid var(--text); outline-offset: 1px; }
    .btn { display: block; width: 100%; padding: 13px; border-radius: var(--radius); font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; border: none; background: var(--text); color: var(--bg); margin-bottom: 1rem; }
    .btn-ghost { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border2); }
    #qr-wrap { display: none; text-align: center; padding: 1.5rem 0; }
    #qr-wrap canvas { border-radius: var(--radius); }
    #json-preview { background: var(--bg2); border-radius: var(--radius); padding: 1rem; font-size: 12px; font-family: monospace; white-space: pre-wrap; color: var(--text2); border: 0.5px solid var(--border); margin-bottom: 1rem; display: none; word-break: break-all; }
    .nav { margin-bottom: 1.5rem; }
    .nav a { font-size: 13px; color: var(--text2); text-decoration: none; }
    .nav a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="nav"><a href="index.html">← 回比對工具</a></div>
  <h1>工單 QR Code 產生器</h1>
  <p class="sub">輸入工單資訊，產生供比對工具掃描的 QR Code</p>

  <label>料號 (Part No.)</label>
  <input id="partNo" type="text" placeholder="85.10C37.012" />

  <label>滿箱 PCS (外標籤 Qty)</label>
  <input id="fullBoxQty" type="number" placeholder="500" />

  <label>包材數量 (內標籤 Qty)</label>
  <input id="innerQty" type="number" placeholder="50" />

  <label>製造日 (Production Date)</label>
  <input id="productionDate" type="date" />

  <label>備註 / Lot No.</label>
  <input id="lotNo" type="text" placeholder="6052803" />

  <button class="btn" onclick="generate()">產生 QR Code</button>

  <div id="json-preview"></div>
  <div id="qr-wrap">
    <canvas id="qr-canvas"></canvas>
    <br/><br/>
    <button class="btn btn-ghost" onclick="downloadQR()">下載圖片</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    function generate() {
      const data = {
        partNo: document.getElementById('partNo').value.trim(),
        fullBoxQty: Number(document.getElementById('fullBoxQty').value),
        innerQty: Number(document.getElementById('innerQty').value),
        productionDate: document.getElementById('productionDate').value,
        lotNo: document.getElementById('lotNo').value.trim()
      };

      if (!data.partNo || !data.productionDate || !data.lotNo) {
        alert('請填寫料號、製造日、Lot No.'); return;
      }

      const json = JSON.stringify(data);
      const preview = document.getElementById('json-preview');
      preview.textContent = json;
      preview.style.display = 'block';

      const canvas = document.getElementById('qr-canvas');
      QRCode.toCanvas(canvas, json, { width: 240, margin: 2, errorCorrectionLevel: 'M' }, err => {
        if (err) { alert('產生失敗：' + err.message); return; }
        document.getElementById('qr-wrap').style.display = 'block';
      });
    }

    function downloadQR() {
      const canvas = document.getElementById('qr-canvas');
      const partNo = document.getElementById('partNo').value.trim() || 'qrcode';
      const a = document.createElement('a');
      a.download = `QR_${partNo}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
